<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container" id="box">
        <h2>Counter</h2>

        <p id="count">0</p>

        <button class="plus" id="btnplus">+</button>
        <button class="minus" id="btnminus">-</button>
        <button class="reset" id="btnreset">Reset</button>

        <br><br>

        <button id="colorBtn">Rangni o'zgartir</button>
    </div>

    <div class="oynacha" id="popup">
        <div class="modal-content">
            <h4>Iltimos kozlaringizga dam bering 👁️👁️</h4>
            <p>Va biroz dam oling</p>


            <button class="okBtn" id="okBtn">OK</button>
        </div>
    </div>

    <script src="app.js">

    </script>

</body>

</html>
